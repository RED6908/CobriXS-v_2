name: Cypress E2E TESTS

on:
  push:
    branches:
      - main
      - testing
  pull_request:
    branches:
      - main

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependencias
        run: npm install

      - name: Construir proyecto (TypeScript)
        run: npm run build

      - name: Preview, esperar y Cypress
        run: |
          set -e
          npm run preview &
          npx wait-on http://127.0.0.1:4173 --timeout 120000
          npx cypress run