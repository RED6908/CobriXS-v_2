name: Cypress E2E TESTS

on:
  push:
    branches:
      - main
      - testing
  pull_request:
    branches:
      - main

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependencias
        run: npm install

      - name: Construir proyecto (TypeScript)
        run: npm run build

      - name: Levantar servidor
        run: npm run preview &

      - name: Esperar servidor
        run: npx wait-on http://localhost:4173

      - name: Ejecutar Cypress
        run: npx cypress run