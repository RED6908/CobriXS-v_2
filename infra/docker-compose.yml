version: '3.8'

services:
  backend:
    build: .
    ports:
      - "4000:4000"
    env_file:
      - .env.staging
    
    #Usa variables del sistema o .env local
    #Siempre corre en modo desarrollo
    #environment:
      #- SUPABASE_URL=${SUPABASE_URL}
      #- SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      #- NODE_ENV=development

    volumes:
      - .:/app
      - /app/node_modules
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3